<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hasil Cetak</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
  <div class="card shadow-sm">
    <div class="card-body">

      <h4 class="mb-3">Dokumen berhasil disiapkan</h4>

      <p class="text-muted">
        Jumlah surat yang dipilih: <strong>{{ jumlah }}</strong>
      </p>

      <div class="d-flex gap-2 flex-wrap">

        <form method="post" action="/download/surat-tanggung-jawab">
          <button type="submit" class="btn btn-success">
            Unduh Surat Tanggung Jawab
          </button>
        </form>

        <form method="post" action="/download/daftar-pengiriman">
          <button type="submit" class="btn btn-outline-dark">
            Unduh Daftar Pengiriman X-5
          </button>
        </form>

        <form method="post" action="/download/amplop">
          <button type="submit" class="btn btn-outline-primary">
            Unduh Amplop
          </button>
        </form>

        <a href="/cetak" class="btn btn-secondary">
          Kembali ke Halaman Cetak
        </a>

        <a href="/" class="btn btn-outline-secondary">
          Homepage
        </a>

      </div>

    </div>
  </div>
</div>

</body>
</html>
