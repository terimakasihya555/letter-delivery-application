<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if mode == 'edit' %}Edit{% else %}Tambah{% endif %} Rekap Surat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-9">

      <div class="card shadow-sm">
        <div class="card-body">

          <h3 class="mb-3">
            {% if mode == 'edit' %}
              Edit Rekap Surat
            {% else %}
              Tambah Rekap Surat
            {% endif %}
          </h3>

          <form method="post">
            <div class="row g-3">

              <div class="col-md-6">
                <label class="form-label">Bulan</label>
                <input name="bulan" class="form-control" required
                       value="{{ surat['bulan'] if surat else '' }}"
                       placeholder="Contoh: Juni">
              </div>

              <div class="col-md-6">
                <label class="form-label">Tahun</label>
                <input name="tahun" class="form-control" required
                       value="{{ surat['tahun'] if surat else '' }}"
                       placeholder="Contoh: 2026">
              </div>

              <div class="col-md-4">
                <label class="form-label">No.</label>
                <input name="nomor_urut" type="number" class="form-control" required
                       value="{{ surat['nomor_urut'] if surat else '' }}">
              </div>

              <div class="col-md-8">
                <label class="form-label">Nomor Referensi</label>
                <input name="nomor_referensi" class="form-control" required
                       value="{{ surat['nomor_referensi'] if surat else '' }}"
                       placeholder="Contoh: 777/PAN/ROG/HK1.3/VI/2026">
              </div>

              <div class="col-md-4">
                <label class="form-label">Kode Surat</label>
                <input name="kode_surat" class="form-control"
                       value="{{ surat['kode_surat'] if surat else '' }}"
                       placeholder="Contoh: 1.3">
              </div>

              <div class="col-md-8">
                <label class="form-label">Klasifikasi</label>
                <input name="klasifikasi" class="form-control"
                       value="{{ surat['klasifikasi'] if surat else '' }}"
                       placeholder="Contoh: Nota Kesepahaman">
              </div>

              <div class="col-12">
                <label class="form-label">Alamat / Ditujukan Kepada</label>
                <textarea name="alamat" class="form-control" rows="6" required
                          placeholder="SDR. KETUA PENGADILAN NEGERI BANJARMASIN&#10;JALAN D.I PANJAITAN NOMOR 27, ANTASAN BESAR,&#10;KOTA BANJARMASIN">{{ surat['alamat'] if surat else '' }}</textarea>
              </div>

            </div>

            <div class="mt-4 d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                Simpan
              </button>

              <a href="/rekap" class="btn btn-secondary">
                Kembali
              </a>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
